openapi: 3.0.0
info:
  title: Inspector Programming API
  version: 1.0.0

paths:
  /users:
    get:
      summary: Get users by group
      parameters:
        - name: group
          in: query
          required: true
          schema:
            type: string
          description: The user group to filter by
      responses:
        '200':
          description: A list of users in the group
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email
